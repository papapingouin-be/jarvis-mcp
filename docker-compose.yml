version: "3.9"

services:
  jarvis-mcp-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jarvis-mcp-tools
    environment:
      - JARVIS_MCP_TRANSPORT=http
      - PORT=7010
      - CORS_ORIGIN=*
      - NODE_ENV=production
    ports:
      - "7010:7010"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7010/mcp', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Add a development version with hot reload
  jarvis-mcp-tools-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    container_name: jarvis-mcp-tools-dev
    environment:
      - JARVIS_MCP_TRANSPORT=http
      - PORT=7011
      - CORS_ORIGIN=*
      - NODE_ENV=development
    ports:
      - "7011:7011"
    volumes:
      - ./src:/app/src
      - ./build:/app/build
    command: ["npm", "run", "serve:http"]
    profiles:
      - dev

networks:
  jarvis_net:
    external: true
    name: jarvis_net
