version: "3.8"

services:
  mcp_tools:
    build:
      context: ..
      dockerfile: Dockerfile
    image: jarvis-mcp-tools:local
    container_name: jarvis_mcp_tools
    restart: unless-stopped
    environment:
      TZ: Europe/Brussels
      NPM_URL: "http://192.168.12.1:81"
      NPM_IDENTITY: "jarvis.eureka@gmail.com"
      NPM_SECRET: "Server76"
    ports:
      - "127.0.0.1:7010:7010"
    volumes:
      # Mount host tools read-only
      - /home/jarvis/tools:/opt/host-tools:ro
    networks:
      - jarvis_net

networks:
  jarvis_net:
    external: true
