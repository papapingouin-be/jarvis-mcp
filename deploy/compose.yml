version: "3.8"

services:
  jarvis-mcp-tools:
    build:
      context: ..
      dockerfile: Dockerfile
    image: jarvis-mcp-tools:local
    container_name: jarvis-mcp-tools
    restart: unless-stopped
    environment:
      JARVIS_MCP_TRANSPORT: "${jarvis_tools_MCP_TRANSPORT:-http}"
      PORT: "${jarvis_tools_PORT:-7010}"
      CORS_ORIGIN: "${jarvis_tools_CORS_ORIGIN:-*}"
      TZ: "${jarvis_tools_TZ:-Europe/Brussels}"

      DATABASE_URL: "${jarvis_tools_DATABASE_URL:-}"
      MASTER_KEY_FILE: "${jarvis_tools_MASTER_KEY_FILE:-}"
      MASTER_KEY: "${jarvis_tools_MASTER_KEY:-}"
      JARVIS_GIT_BRIDGE_PG_MODULE: "${jarvis_tools_GIT_BRIDGE_PG_MODULE:-pg}"

      jarvis_tools_PG_URL: "${jarvis_tools_PG_URL:-}"
      jarvis_tools_PG_DB: "${jarvis_tools_PG_DB:-}"
      jarvis_tools_PG_USER: "${jarvis_tools_PG_USER:-}"
      jarvis_tools_PG_PASSWORD: "${jarvis_tools_PG_PASSWORD:-}"
      JARVIS_PG_USER: "${jarvis_tools_PG_USER:-}"
      JARVIS_PG_PASSWORD: "${jarvis_tools_PG_PASSWORD:-}"
      jarvis_tools_DATABASE_URL: "${jarvis_tools_DATABASE_URL:-}"

      NPM_URL: "${jarvis_tools_NPM_URL:-}"
      NPM_IDENTITY: "${jarvis_tools_NPM_IDENTITY:-}"
      NPM_SECRET: "${jarvis_tools_NPM_SECRET:-}"

      jarvis_tools_SERVER_URL: "${jarvis_tools_SERVER_URL:-}"
      jarvis_tools_SERVER_USER: "${jarvis_tools_SERVER_USER:-}"
      jarvis_tools_SERVER_PASSWORD: "${jarvis_tools_SERVER_PASSWORD:-}"
      jarvis_tools_PORTAINER_URL: "${jarvis_tools_PORTAINER_URL:-}"
      jarvis_tools_PORTAINER_USER: "${jarvis_tools_PORTAINER_USER:-}"
      jarvis_tools_PORTAINER_PASSWORD: "${jarvis_tools_PORTAINER_PASSWORD:-}"
      jarvis_tools_NPM_BASE_DOMAIN: "${jarvis_tools_NPM_BASE_DOMAIN:-}"
      jarvis_tools_NPM_DUCKDNS_TOKEN: "${jarvis_tools_NPM_DUCKDNS_TOKEN:-}"
      jarvis_tools_NPM_DUCKDNS_DOMAIN: "${jarvis_tools_NPM_DUCKDNS_DOMAIN:-}"
      jarvis_tools_GITEA_TOKEN: "${jarvis_tools_GITEA_TOKEN:-}"
      jarvis_tools_GITEA_IDENTITY: "${jarvis_tools_GITEA_IDENTITY:-}"
      jarvis_tools_GITEA_URL: "${jarvis_tools_GITEA_URL:-}"
      jarvis_tools_GITEA_SSH_HOST: "${jarvis_tools_GITEA_SSH_HOST:-}"
      jarvis_tools_GITEA_SSH_PORT: "${jarvis_tools_GITEA_SSH_PORT:-}"
      jarvis_tools_GITHUB_TOKEN: "${jarvis_tools_GITHUB_TOKEN:-}"
      GITHUB_TOKEN: "${jarvis_tools_GITHUB_TOKEN:-}"
      jarvis_tools_GITHUB_IDENTITY: "${jarvis_tools_GITHUB_IDENTITY:-}"
      jarvis_tools_GITHUB_URL: "${jarvis_tools_GITHUB_URL:-}"
      JARVIS_SCRIPT_RUNNER_SCRIPTS_ROOT: "${jarvis_tools_SCRIPT_RUNNER_SCRIPTS_ROOT:-/opt/jarvis/shared/scripts}"
      JARVIS_SCRIPTS_ROOT: "${jarvis_tools_SCRIPTS_ROOT:-/opt/jarvis/shared/scripts}"
      JARVIS_SYNC_BUILD_REDEPLOY_SCRIPT: "${jarvis_tools_SYNC_BUILD_REDEPLOY_SCRIPT:-/app/tools/scripts/jarvis_sync_build_redeploy.sh}"
      RESTART_STRATEGY: "${jarvis_tools_RESTART_STRATEGY:-docker}"
    ports:
      - "${jarvis_tools_PORT:-7010}:${jarvis_tools_PORT:-7010}"
    volumes:
      - /home/jarvis/tools:/opt/host-tools:ro
      - ${jarvis_tools_SCRIPTS_HOST_PATH:-/opt/jarvis/shared/scripts}:/opt/jarvis/shared/scripts:ro
      - ${jarvis_tools_SYNC_BUILD_REDEPLOY_ENV_FILE_HOST_PATH:-/opt/jarvis/mcp/jarvis_sync_build_redeploy.env}:/app/tools/.env:ro
    networks:
      - jarvis_net

networks:
  jarvis_net:
    external: true
