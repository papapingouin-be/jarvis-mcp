version: "3.8"

services:
  mcp_tools:
    build:
      context: ..
      dockerfile: Dockerfile
    image: jarvis-mcp-tools:local
    container_name: jarvis_mcp_tools
    restart: unless-stopped
    environment:
      STARTER_TRANSPORT: "${STARTER_TRANSPORT:-http}"
      PORT: "${PORT:-7010}"
      TZ: "${TZ:-Europe/Brussels}"
      NPM_URL: "${NPM_URL}"
      NPM_IDENTITY: "${NPM_IDENTITY}"
      NPM_SECRET: "${NPM_SECRET}"
    ports:
      - "7010:7010"
    volumes:
      # Mount host tools read-only
      - /home/jarvis/tools:/opt/host-tools:ro
    networks:
      - jarvis_net

networks:
  jarvis_net:
    external: true
